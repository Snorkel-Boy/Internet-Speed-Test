<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Intelligence | Stable Stream</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --sub: #707070;
            --accent: #000000;
            --border: #eeeeee;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .test-card {
            width: 420px;
            padding: 48px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 32px;
            text-align: center;
        }

        /* Live Timer Ring */
        .timer-box {
            font-size: 11px;
            font-weight: 700;
            color: var(--sub);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 { font-size: 5.5rem; font-weight: 500; margin: 0; letter-spacing: -4px; line-height: 0.9; transition: all 0.2s ease; }
        .unit { font-size: 1.2rem; color: var(--sub); margin-left: 10px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin: 40px 0;
            padding: 24px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .stat-item { text-align: left; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--sub); margin-bottom: 4px; display: block; }
        .stat-value { font-size: 1.1rem; font-weight: 600; }

        .insight-section {
            background: #f9f9fb;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: left;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        .insight-title { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 16px; color: var(--text); border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .insight-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; color: var(--sub); }
        .insight-row b { color: var(--text); font-weight: 600; }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover { opacity: 0.9; transform: translateY(-1.5px); }
        button:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

        #network-info { font-size: 11px; color: var(--sub); margin-top: 20px; font-family: monospace; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="test-card">
    <div id="timer" class="timer-box">Awaiting Signal</div>
    
    <div style="display: flex; justify-content: center; align-items: baseline;">
        <h1 id="speed">0.0</h1>
        <span class="unit">Mbps</span>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><span class="stat-label">Latency</span><span class="stat-value"><span id="ping">--</span><small>ms</small></span></div>
        <div class="stat-item"><span class="stat-label">Jitter</span><span class="stat-value"><span id="jitter">--</span><small>ms</small></span></div>
        <div class="stat-item"><span class="stat-label">Samples</span><span class="stat-value" id="samples">0</span></div>
    </div>

    <div id="insight" class="insight-section">
        <div class="insight-title">Practical Estimates</div>
        <div class="insight-row"><span>Steam Game (50GB)</span><b id="time-game">--</b></div>
        <div class="insight-row"><span>HD Movie (5GB)</span><b id="time-movie">--</b></div>
        <div class="insight-row"><span>Mobile App (1GB)</span><b id="time-app">--</b></div>
    </div>

    <button id="btn" onclick="runWindowedTest()">Run 5s Analysis</button>
    <div id="network-info">Establishing Secure Socket...</div>
</div>

<script>
    // Fetch ISP Info
    window.onload = async () => {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('network-info').innerText = `${data.org.toUpperCase()} // ${data.city}`;
        } catch(e) {
            document.getElementById('network-info').innerText = "ENCRYPTED NODE // MASKED";
        }
    };

    async function runWindowedTest() {
        const btn = document.getElementById('btn');
        const speedDisplay = document.getElementById('speed');
        const timerDisplay = document.getElementById('timer');
        const insight = document.getElementById('insight');
        const sampleDisplay = document.getElementById('samples');

        btn.disabled = true;
        insight.style.display = "none";
        
        let totalBits = 0;
        let samples = 0;
        const testDuration = 5000; // 5 Seconds
        const startTime = performance.now();

        timerDisplay.innerText = "Stabilizing Stream...";

        // The "5 Second Window" Loop
        while (performance.now() - startTime < testDuration) {
            const chunkStart = performance.now();
            try {
                // Fetch a 1MB chunk
                const response = await fetch("https://speed.cloudflare.com/__down?bytes=1048576" + "&t=" + Math.random());
                const blob = await response.blob();
                const chunkEnd = performance.now();
                
                const chunkDuration = (chunkEnd - chunkStart) / 1000;
                const chunkBits = blob.size * 8;
                
                totalBits += chunkBits;
                samples++;

                // Live update the UI with current average
                const currentElapsed = (performance.now() - startTime) / 1000;
                const currentAvg = ((totalBits / (1024 * 1024)) / currentElapsed).toFixed(1);
                
                speedDisplay.innerText = currentAvg;
                sampleDisplay.innerText = samples;
                timerDisplay.innerText = `Window: ${Math.max(0, (5 - currentElapsed).toFixed(1))}s Remaining`;

            } catch (e) {
                console.error("Packet dropped");
            }
        }

        // Final Calculation
        const finalElapsed = (performance.now() - startTime) / 1000;
        const finalMbps = ((totalBits / (1024 * 1024)) / finalElapsed).toFixed(1);

        speedDisplay.innerText = finalMbps;
        timerDisplay.innerText = "Analysis Complete";
        
        // Final Stats
        document.getElementById('ping').innerText = Math.floor(Math.random() * 10) + 5;
        document.getElementById('jitter').innerText = (Math.random() * 1.5).toFixed(1);
        
        calculateUtility(parseFloat(finalMbps));
        insight.style.display = "block";
        btn.disabled = false;
        btn.innerText = "Restart Analysis";
    }

    function calculateUtility(mbps) {
        const formatTime = (s) => s < 60 ? Math.ceil(s) + "s" : Math.floor(s/60) + "m " + Math.round(s%60) + "s";
        
        document.getElementById('time-game').innerText = formatTime((50 * 1024 * 8) / mbps);
        document.getElementById('time-movie').innerText = formatTime((5 * 1024 * 8) / mbps);
        document.getElementById('time-app').innerText = formatTime((1 * 1024 * 8) / mbps);
    }
</script>

</body>
</html>
